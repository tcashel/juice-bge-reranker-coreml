[workspace]
name = "juice-bge-reranker-coreml"
version = "0.1.0"
description = "Maintainer tool: convert BAAI/bge-reranker-base to an ANE-resident Core ML .mlpackage and publish to Hugging Face Hub."
authors = ["Tripp Cashel <tcashel@gmail.com>"]
channels = ["conda-forge"]
platforms = ["osx-arm64"]

[dependencies]
python = "3.13.*"
pip = ">=24"

[pypi-dependencies]
torch = ">=2.2"
transformers = ">=4.40"
coremltools = ">=8.1"
huggingface-hub = ">=0.24"
sentencepiece = ">=0.2"
numpy = "<2.2"
protobuf = ">=3.20"
pytest = ">=8"
ty = ">=0.0.1a"
ruff = ">=0.6"

[tasks]
convert = "python convert.py"
verify-ane = "python verify_ane.py"
bench = "python bench.py"
publish = "python publish.py"
test = "pytest tests/ -v"
typecheck = "ty check"
lint = "ruff check ."
fmt = "ruff format ."
fmt-check = "ruff format --check ."
